services:
  postgres-shift-test:
    image: postgres:16
    container_name: food-crm-shift-test-postgres
    environment:
      POSTGRES_DB: food_crm_shift_test
      POSTGRES_USER: food_crm_shift_test
      POSTGRES_PASSWORD: food_crm_shift_test_dev
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_crm_shift_test -d food_crm_shift_test"]
      interval: 2s
      timeout: 3s
      retries: 30
