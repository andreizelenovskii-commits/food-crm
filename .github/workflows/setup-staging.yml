name: Setup staging infrastructure

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    env:
      FRONTEND_APP_DIR: /home/deploy/apps/food-crm-staging
      BACKEND_APP_DIR: /home/deploy/apps/food-crm-backend-staging
      PROD_FRONTEND_APP_DIR: /home/deploy/apps/food-crm
      PROD_BACKEND_APP_DIR: /home/deploy/apps/food-crm-backend
      DEPLOY_HOST: 163.5.29.68
      DEPLOY_USER: deploy
      DEPLOY_PORT: 22

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare VPS staging
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "FRONTEND_APP_DIR='$FRONTEND_APP_DIR' BACKEND_APP_DIR='$BACKEND_APP_DIR' PROD_FRONTEND_APP_DIR='$PROD_FRONTEND_APP_DIR' PROD_BACKEND_APP_DIR='$PROD_BACKEND_APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$FRONTEND_APP_DIR/shared" "$BACKEND_APP_DIR/shared"

          if [ ! -f "$FRONTEND_APP_DIR/shared/.env" ]; then
            cp "$PROD_FRONTEND_APP_DIR/shared/.env" "$FRONTEND_APP_DIR/shared/.env"
          fi

          grep -v -E '^(BACKEND_API_URL|NEXT_PUBLIC_BACKEND_API_URL|BACKEND_SESSION_COOKIE_NAME)=' "$FRONTEND_APP_DIR/shared/.env" > "$FRONTEND_APP_DIR/shared/.env.tmp" || true
          mv "$FRONTEND_APP_DIR/shared/.env.tmp" "$FRONTEND_APP_DIR/shared/.env"
          {
            echo "BACKEND_API_URL=https://dev-api.crmandromeda.ru"
            echo "NEXT_PUBLIC_BACKEND_API_URL=https://dev-api.crmandromeda.ru"
            echo "BACKEND_SESSION_COOKIE_NAME=food_crm_staging_api_session"
          } >> "$FRONTEND_APP_DIR/shared/.env"
          chmod 600 "$FRONTEND_APP_DIR/shared/.env"

          if [ ! -f "$BACKEND_APP_DIR/shared/.env" ]; then
            cp "$PROD_BACKEND_APP_DIR/shared/.env" "$BACKEND_APP_DIR/shared/.env"
          fi

          PROD_DATABASE_URL="$(grep -E '^DATABASE_URL=' "$PROD_BACKEND_APP_DIR/shared/.env" | cut -d '=' -f2-)"
          STAGING_DATABASE_URL="$(printf '%s' "$PROD_DATABASE_URL" | sed -E 's#/(food_crm)(\\?|$)#/food_crm_staging\\2#')"
          if [ "$STAGING_DATABASE_URL" = "$PROD_DATABASE_URL" ]; then
            echo "Could not derive staging database url from production DATABASE_URL" >&2
            exit 1
          fi

          grep -v -E '^(DATABASE_URL|PORT|BACKEND_CORS_ORIGIN|BACKEND_SESSION_COOKIE_DOMAIN|BACKEND_SESSION_COOKIE_NAME)=' "$BACKEND_APP_DIR/shared/.env" > "$BACKEND_APP_DIR/shared/.env.tmp" || true
          mv "$BACKEND_APP_DIR/shared/.env.tmp" "$BACKEND_APP_DIR/shared/.env"
          {
            echo "DATABASE_URL=$STAGING_DATABASE_URL"
            echo "PORT=4100"
            echo "BACKEND_CORS_ORIGIN=https://dev.crm.crmandromeda.ru,http://localhost:3000,http://127.0.0.1:3000"
            echo "BACKEND_SESSION_COOKIE_DOMAIN=.crmandromeda.ru"
            echo "BACKEND_SESSION_COOKIE_NAME=food_crm_staging_api_session"
          } >> "$BACKEND_APP_DIR/shared/.env"
          chmod 600 "$BACKEND_APP_DIR/shared/.env"

          sudo -n -u postgres createdb food_crm_staging --owner=food_crm_user || true

          if ! sudo -n grep -q 'dev.crm.crmandromeda.ru' /etc/caddy/Caddyfile; then
            printf '\ndev.crm.crmandromeda.ru {\n  reverse_proxy 127.0.0.1:3100\n}\n\ndev-api.crmandromeda.ru {\n  reverse_proxy 127.0.0.1:4100\n}\n' > /tmp/food-crm-staging.Caddyfile
            sudo -n sh -c 'cat /tmp/food-crm-staging.Caddyfile >> /etc/caddy/Caddyfile'
            sudo -n caddy fmt --overwrite /etc/caddy/Caddyfile
            sudo -n caddy validate --config /etc/caddy/Caddyfile
            sudo -n systemctl reload caddy
          fi
          REMOTE
