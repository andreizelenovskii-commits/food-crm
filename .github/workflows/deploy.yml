name: Deploy frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /home/deploy/apps/food-crm
      DEPLOY_HOST: 163.5.29.68
      DEPLOY_USER: deploy
      DEPLOY_PORT: 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          BACKEND_API_URL: https://api.crmandromeda.ru
          NEXT_PUBLIC_BACKEND_API_URL: https://api.crmandromeda.ru
          SESSION_SECRET: build-time-placeholder

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "mkdir -p '$RELEASE_DIR'"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.next' \
            --exclude='backend' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.*' \
            -czf - . | "${SSH[@]}" "tar -xzf - -C '$RELEASE_DIR'"

      - name: Activate release
        run: |
          set -euo pipefail
          SSH=(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST")
          "${SSH[@]}" "APP_DIR='$APP_DIR' RELEASE_DIR='$APP_DIR/releases/$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          test -f "$APP_DIR/shared/.env"
          ln -sfn "$APP_DIR/shared/.env" "$RELEASE_DIR/.env"
          cd "$RELEASE_DIR"
          npm ci
          npm run build
          ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
          cd "$APP_DIR/current"
          pm2 delete food-crm-frontend || true
          pm2 start ecosystem.config.cjs --only food-crm-frontend --update-env
          sleep 5
          curl -fsS http://127.0.0.1:3000 >/dev/null
          curl -fsS http://127.0.0.1:3000/login >/dev/null
          pm2 save
          find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          REMOTE
