# Локальная БД только для разработки. Не для прода.
services:
  postgres:
    image: postgres:16-alpine
    container_name: food-crm-local-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: food_crm_local
      POSTGRES_PASSWORD: food_crm_local_dev
      POSTGRES_DB: food_crm_local
    volumes:
      - food_crm_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_crm_local -d food_crm_local"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  food_crm_local_pgdata:
